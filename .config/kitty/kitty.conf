# --------- FUENTE --------------------------
font_family                 JetBrains Mono                                                                                                                                                                                                                                                                                            
font_size                   8.0                                                                                                                                                                                                                                                                                                       
bold_font                   auto                                                                                                                                                                                                                                                                                                      
italic_font                 auto                                                                                                                                                                                                                                                                                                      
bold_italic_font            auto                                                                                                                                                                                                                                                                                                      

# --------- ESTILO DE KITTY ------------------                                                                                                                                                                                                                                                                                                           
