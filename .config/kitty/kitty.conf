# --------- FUENTE --------------------------
font_family                 FiraCode Nerd Font Mono
font_size                   8.0
bold_font                   FiraCode Nerd Font Mono
italic_font                 FiraCode Nerd Font Mono
bold_italic_font            FiraCode Nerd Font Mono

# --------- ESTILO DE KITTY -----------------
cursor_trail 1
confirm_os_window_close     0

scrollback_lines            2000
wheel_scroll_min_lines      1

enable_audio_bell           no
hide_window_decorations     yes

background_opacity          0.7

dynamic_background_opacity  yes

# --------- ATAJOS ---------------------------
map ctrl+alt+t new_tab_with_cwd

# --------- ESTILO BARRA DE PESTAÑAS ---------
tab_bar_style               powerline
tab_powerline_style         slanted
window_padding_width        8

# --------- COLORES --------------------------
# --- PESTAÑAS ---
active_tab_foreground   #fff
active_tab_background   #1a1a1a
active_tab_font_style   bold
inactive_tab_foreground #6f6f6f
inactive_tab_background #2b2b2b
inactive_tab_font_style normal
# --- FONDO Y TEXTO ------
background              #000                                                                                                                                                                                                                                                                           
foreground              #e3e3e3
